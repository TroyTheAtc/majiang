<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#8b0000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>老婆的麻将日记</title>
  <link rel="preload" href="c6f419bb9e8f31278b934d0f75ef9ba2.png?v=1.2" as="image" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=1.2" />
</head>
<body>
  <div class="app">
    <!-- 顶部标题栏 -->
    <header class="header">
      <h1 class="logo">
        <span class="logo-tile logo-tile-left">中</span>
        <span class="logo-text">老婆的麻将日记</span>
        <span class="logo-tile logo-tile-right">發</span>
      </h1>
      <nav class="tabs">
        <button type="button" class="tab active" data-view="list">记录</button>
        <button type="button" class="tab" data-view="add">记一笔</button>
        <button type="button" class="tab" data-view="stats">统计</button>
      </nav>
    </header>

    <main class="main">
      <!-- 记录列表视图 -->
      <section id="view-list" class="view view-list active">
        <div class="list-summary">
          <span class="summary-label">今年战绩</span>
          <span id="total-amount" class="summary-amount">0</span>
        </div>
        <ul id="record-list" class="record-list"></ul>
        <p id="empty-tip" class="empty-tip">暂无记录，点击「记一笔」添加</p>
      </section>

      <!-- 新增记录视图 -->
      <section id="view-add" class="view view-add">
        <form id="form-add" class="form-add">
          <div class="field">
            <label>日期</label>
            <input type="date" name="date" required />
          </div>
          <div class="field">
            <label>对象</label>
            <div class="category-options">
              <label class="chip"><input type="radio" name="category" value="机场" /><span>机场</span></label>
              <label class="chip"><input type="radio" name="category" value="家人" checked /><span>家人</span></label>
              <label class="chip"><input type="radio" name="category" value="同事" /><span>同事</span></label>
              <label class="chip"><input type="radio" name="category" value="同学" /><span>同学</span></label>
              <label class="chip"><input type="radio" name="category" value="朋友" /><span>朋友</span></label>
            </div>
          </div>
          <div class="field">
            <label>地点</label>
            <input type="text" name="location" placeholder="如：家里、茶楼" maxlength="20" />
          </div>
          <div class="field">
            <label>战绩（元）</label>
            <div class="amount-row">
              <label class="chip chip-win"><input type="radio" name="winloss" value="win" required /><span>赢</span></label>
              <label class="chip chip-loss"><input type="radio" name="winloss" value="loss" /><span>输</span></label>
            </div>
            <input type="number" name="amount" placeholder="输入金额" min="0" step="1" required />
          </div>
          <button type="submit" class="btn btn-primary">保存</button>
        </form>
      </section>

      <!-- 统计视图 -->
      <section id="view-stats" class="view view-stats">
        <div class="stats-total card-tile">
          <span class="stats-total-label">总输赢</span>
          <span id="stats-total-amount" class="stats-total-amount">0</span>
        </div>
        <div class="stats-by">
          <div class="stats-type-tabs">
            <button type="button" class="stats-type-btn active" data-type="category">按对象统计</button>
            <button type="button" class="stats-type-btn" data-type="location">按地点统计</button>
            <button type="button" class="stats-type-btn" data-type="year">按年份统计</button>
          </div>
          <ul id="stats-category-list"></ul>
        </div>
      </section>
    </main>

    <!-- 底部安全区占位 -->
    <div class="safe-bottom"></div>
  </div>
  <script src="app.js?v=1.2"></script>
</body>
</html>
