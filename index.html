<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#8b0000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>老婆的麻将日记</title>
  <!-- 仅预加载首屏关键脚本；大图与占卜等级图不 preload，按需加载 -->
  <link rel="preload" href="assets/js/solarlunar.min.js" as="script" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@600;700&display=swap" /></noscript>
  <link rel="stylesheet" href="src/css/style.css?v=1.6.4.4" />
</head>
<body>
  <div class="app">
    <!-- 顶部标题栏 -->
    <header class="header">
      <h1 class="logo">
        <span class="logo-tile logo-tile-left">中</span>
        <span class="logo-text">老婆的麻将日记</span>
        <span class="logo-tile logo-tile-right">發</span>
      </h1>
      <nav class="tabs">
        <button type="button" class="tab active" data-view="list">牌谱</button>
        <button type="button" class="tab" data-view="add">搓一把</button>
        <button type="button" class="tab" data-view="divine">占卜</button>
        <button type="button" class="tab" data-view="stats">算账</button>
      </nav>
    </header>

    <main class="main">
      <!-- 记录列表视图 -->
      <section id="view-list" class="view view-list active">
        <div class="list-summary">
          <span class="list-summary-spacer" aria-hidden="true"></span>
          <div class="list-summary-inner">
            <span class="summary-label">今年战绩</span>
            <span id="total-amount" class="summary-amount">0</span>
          </div>
          <button type="button" id="btn-eye" class="btn-eye btn-eye-list" aria-label="隐藏金额"><img src="assets/images/yanjing.png" alt="" /></button>
        </div>
        <ul id="record-list" class="record-list"></ul>
        <p id="empty-tip" class="empty-tip">暂无记录，点击「搓一把」添加</p>
      </section>

      <!-- 新增记录视图 -->
      <section id="view-add" class="view view-add">
        <form id="form-add" class="form-add">
          <div class="field">
            <label for="field-date">日期</label>
            <input type="date" id="field-date" name="date" required />
          </div>
          <div class="field">
            <label>对象</label>
            <div id="category-options" class="category-options">
              <!-- 子标签与添加按钮由 add.js 动态渲染 -->
            </div>
          </div>
          <div class="field">
            <label for="field-location">地点</label>
            <input type="text" id="field-location" name="location" placeholder="如：家里、茶楼" maxlength="20" />
          </div>
          <div class="field">
            <label for="field-amount">战绩</label>
            <div class="amount-row">
              <label class="chip chip-win"><input type="radio" name="winloss" value="win" required /><span>赢</span></label>
              <label class="chip chip-loss"><input type="radio" name="winloss" value="loss" /><span>输</span></label>
            </div>
            <input type="number" id="field-amount" name="amount" placeholder="输入比分" min="0" step="1" required />
          </div>
          <button type="submit" class="btn btn-primary">保存</button>
        </form>
      </section>

      <!-- 占卜视图 -->
      <section id="view-divine" class="view view-divine">
        <div id="divine-content" class="divine-content"></div>
      </section>

      <!-- 统计视图 -->
      <section id="view-stats" class="view view-stats">
        <div id="stats-total-card" class="stats-total card-tile stats-total-clickable">
          <span class="stats-total-label">总战绩</span>
          <div class="stats-total-row">
            <button type="button" class="btn-eye btn-eye-stats" aria-label="隐藏金额"><img src="assets/images/yanjing.png" alt="" /></button>
            <span class="stats-total-spacer" aria-hidden="true"></span>
            <span id="stats-total-amount" class="stats-total-amount">0</span>
            <span class="stats-total-spacer" aria-hidden="true"></span>
            <span class="stats-total-right">
              <span id="stats-win-rate" class="stats-win-rate">—</span>
            </span>
          </div>
        </div>
        <div class="stats-by">
          <div class="stats-type-tabs">
            <button type="button" class="stats-type-btn active" data-type="category">按对象统计</button>
            <button type="button" class="stats-type-btn" data-type="location">按地点统计</button>
            <button type="button" class="stats-type-btn" data-type="year">按年份统计</button>
          </div>
          <ul id="stats-category-list"></ul>
        </div>
        <button type="button" id="btn-open-transfer" class="stats-transfer-btn">数据导入/导出</button>
        <!-- 点击某一项后弹出的详情小卡片 -->
        <div id="stats-detail-overlay" class="stats-detail-overlay" aria-hidden="true">
          <div class="stats-detail-card card-tile">
            <div class="stats-detail-title" id="stats-detail-title">—</div>
            <div class="stats-detail-streak-wrap" id="stats-detail-streak-wrap" aria-hidden="true">
              <span id="stats-detail-streak" class="stats-detail-streak"></span>
            </div>
            <dl class="stats-detail-dl">
              <dt>总局数</dt><dd id="stats-detail-total-games">0</dd>
              <dt>胜利局数</dt><dd id="stats-detail-win-games">0</dd>
              <dt>胜率</dt><dd id="stats-detail-win-rate">—</dd>
              <dt>场均得分</dt><dd id="stats-detail-avg">—</dd>
              <dt>最长连胜</dt><dd id="stats-detail-max-win-streak">—</dd>
              <dt>最长连败</dt><dd id="stats-detail-max-loss-streak">—</dd>
              <dt>单场最多得失</dt><dd id="stats-detail-single-extreme"><span id="stats-detail-single-max" class="detail-val">—</span> / <span id="stats-detail-single-min" class="detail-val">—</span></dd>
            </dl>
          </div>
        </div>
        <!-- 数据导入/导出弹层（从「数据导入/导出」按钮打开） -->
        <div id="transfer-overlay" class="transfer-overlay" aria-hidden="true">
          <div class="transfer-overlay-panel card-tile">
            <p class="transfer-desc">复制 JSON 备份或粘贴导入</p>
            <button type="button" id="btn-export-copy" class="btn btn-primary btn-block">复制 JSON</button>
            <button type="button" id="btn-import-paste" class="btn btn-outline btn-block">粘贴导入</button>
            <div id="transfer-import-paste-wrap" class="transfer-import-paste-wrap" style="display:none">
              <textarea id="input-import-paste" class="transfer-import-paste-textarea" placeholder="在此粘贴 JSON 数据后点击下方按钮" rows="4"></textarea>
              <button type="button" id="btn-import-paste-confirm" class="btn btn-primary btn-block">确认导入</button>
            </div>
            <button type="button" class="btn btn-outline btn-block close-transfer-btn">关闭</button>
          </div>
        </div>
      </section>
    </main>

    <!-- 底部安全区占位 -->
    <div class="safe-bottom"></div>
  </div>
  <span class="app-version" aria-hidden="true">v1.6.4.4</span>
  <!-- 农历与建除：solarlunar 用于展示，lunar-javascript 用于占卜宜忌（建除十二值日） -->
  <script src="assets/js/solarlunar.min.js" defer></script>
  <script src="assets/js/lunar.min.js?v=1.6.4.4" defer></script>
  <script src="src/js/data.js?v=1.6.4.4" defer></script>
  <script src="src/js/stats.js?v=1.6.4.4" defer></script>
  <script src="src/js/view.js?v=1.6.4.4" defer></script>
  <script src="src/js/add.js?v=1.6.4.4" defer></script>
  <script src="src/js/list.js?v=1.6.4.4" defer></script>
  <script src="src/js/divine.js?v=1.6.4.4" defer></script>
  <script src="src/js/transfer.js?v=1.6.4.4" defer></script>
  <script src="src/js/app.js?v=1.6.4.4" defer></script>
</body>
</html>
